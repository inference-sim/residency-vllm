# Workload spec for blis observe: 5 tenants, symmetric Poisson load.
# This is a reference template. run_ab_experiment.sh generates the actual
# spec dynamically based on --rate, --tenants, --duration, and --seed args.
#
# Key mapping from old workload_driver.py parameters:
#   aggregate_rate = num_tenants * per_tenant_rate
#   horizon        = duration * 1_000_000 (seconds -> microseconds)
#   rate_fraction  = 1.0 / num_tenants (equal split)
#   input constant 1024 -> observe calibrates word count to hit 1024 tokens
#   output constant 128 -> observe sets min_tokens = max_tokens = 128

version: "2"
seed: 42
aggregate_rate: 10.0    # 5 tenants x 2 req/s
horizon: 300000000      # 300 seconds in microseconds

clients:
  - id: "tenant_A"
    tenant_id: "tenant_A"
    rate_fraction: 0.2
    streaming: true
    arrival:
      process: poisson
    input_distribution:
      type: constant
      params:
        value: 1024
    output_distribution:
      type: constant
      params:
        value: 128

  - id: "tenant_B"
    tenant_id: "tenant_B"
    rate_fraction: 0.2
    streaming: true
    arrival:
      process: poisson
    input_distribution:
      type: constant
      params:
        value: 1024
    output_distribution:
      type: constant
      params:
        value: 128

  - id: "tenant_C"
    tenant_id: "tenant_C"
    rate_fraction: 0.2
