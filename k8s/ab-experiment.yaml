# A/B Experiment: Patched (residency-instrumented) vs Vanilla vLLM
# Both Jobs use identical workload parameters and seed for fair comparison.
# Driver: blis observe (replaces workload_driver.py)
---
apiVersion: batch/v1
kind: Job
metadata:
  name: residency-experiment-patched
  labels:
    experiment: ab-residency
    variant: patched
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: Never
      shareProcessNamespace: true
      initContainers:
        - name: init-prometheus
          image: busybox
          command: ["mkdir", "-p", "/tmp/prometheus_multiproc"]
          volumeMounts:
            - name: prom-dir
              mountPath: /tmp/prometheus_multiproc
      containers:
        # --- vLLM server (patched with residency instrumentation) ---
        - name: vllm
          image: ghcr.io/inference-sim/residency-vllm:0.23.0-residency-v2
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              nvidia.com/gpu: 1
          command: ["/bin/sh", "-c"]
          args:
            - |
              vllm serve --model Qwen/Qwen3-14B --port 8000 &
              VLLM_PID=$!
              while [ ! -f /data/residency/patched/.done ]; do
                sleep 5
              done
              echo "Driver finished. Shutting down vLLM server."
              kill $VLLM_PID
              wait $VLLM_PID 2>/dev/null
              rm -f /data/residency/patched/.done
              exit 0
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
            - name: HOME
              value: "/cache"
            - name: HF_HOME
              value: "/cache/huggingface"
            - name: PROMETHEUS_MULTIPROC_DIR
              value: "/tmp/prometheus_multiproc"
          volumeMounts:
            - name: cache
              mountPath: /cache
            - name: prom-dir
              mountPath: /tmp/prometheus_multiproc
            - name: data
              mountPath: /data

        # --- Workload driver (blis observe) ---
        - name: driver
          image: ghcr.io/inference-sim/residency-vllm-observe:0.23.0-residency-v2
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for vLLM server to be ready..."
              while ! wget -q -O /dev/null http://localhost:8000/v1/models 2>/dev/null; do
                sleep 5
              done
              echo "Server ready. Starting experiment (patched variant)."

              VARIANT="patched"
              OUTPUT_DIR="/data/residency/${VARIANT}"
              mkdir -p "$OUTPUT_DIR"

              blis observe \
                --server-url http://localhost:8000 \
                --model Qwen/Qwen3-14B \
                --api-format chat \
                --workload-spec /data/residency/workload.yaml \
                --seed 42 \
                --trace-header "${OUTPUT_DIR}/trace.yaml" \
                --trace-data "${OUTPUT_DIR}/trace.csv" \
                --record-itl

              echo "blis observe complete. Post-processing..."

              python3 /app/postprocess_trace.py \
                --trace-csv "${OUTPUT_DIR}/trace.csv" \
                --itl-csv "${OUTPUT_DIR}/trace.itl.csv" \
                --output-dir "$OUTPUT_DIR" \
                --server-url http://localhost:8000 \
                --model Qwen/Qwen3-14B \
                --rate 2.0 \
                --duration 300 \
                --seed 42

              echo "Experiment complete. Results written to ${OUTPUT_DIR}/"
              touch "${OUTPUT_DIR}/.done"
          volumeMounts:
            - name: data
              mountPath: /data

      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: vllm-cache-pvc
        - name: prom-dir
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: data-pvc
---
