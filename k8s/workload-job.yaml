apiVersion: batch/v1
kind: Job
metadata:
  name: residency-experiment
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: driver
          image: ghcr.io/inference-sim/residency-vllm-client:latest
          args:
            - "--base-url"
            - "http://vllm-residency:8000"
            - "--model"
            - "Qwen/Qwen3-14B"
            - "--tenants"
            - "tenant_A,tenant_B,tenant_C"
            - "--rate"
            - "2.0"
            - "--duration"
            - "300"
            - "--prompt-tokens"
            - "1024"
            - "--max-tokens"
            - "128"
            - "--output-dir"
            - "/results"
          volumeMounts:
            - name: results
              mountPath: /results
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: vllm-cache-pvc
