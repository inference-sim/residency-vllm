apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-residency
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-residency
  template:
    metadata:
      labels:
        app: vllm-residency
    spec:
      containers:
        - name: vllm
          image: ghcr.io/inference-sim/residency-vllm:0.23.1-residency
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              nvidia.com/gpu: 1
          args:
            - "--model"
            - "meta-llama/Llama-3.1-8B"
            - "--port"
            - "8000"
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
            - name: HOME
              value: "/cache"
            - name: HF_HOME
              value: "/cache/huggingface"
            - name: PROMETHEUS_MULTIPROC_DIR
              value: "/tmp/prometheus_multiproc"
          volumeMounts:
            - name: cache
              mountPath: /cache
            - name: prom-dir
              mountPath: /tmp/prometheus_multiproc
      initContainers:
        - name: init-prometheus
          image: busybox
          command: ["mkdir", "-p", "/tmp/prometheus_multiproc"]
          volumeMounts:
            - name: prom-dir
              mountPath: /tmp/prometheus_multiproc
      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: vllm-cache-pvc
        - name: prom-dir
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-residency
spec:
  selector:
    app: vllm-residency
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-cache-pvc
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
