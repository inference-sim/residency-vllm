apiVersion: batch/v1
kind: Job
metadata:
  name: residency-experiment
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 60
  template:
    spec:
      restartPolicy: Never
      shareProcessNamespace: true
      initContainers:
        - name: init-prometheus
          image: busybox
          command: ["mkdir", "-p", "/tmp/prometheus_multiproc"]
          volumeMounts:
            - name: prom-dir
              mountPath: /tmp/prometheus_multiproc
      containers:
        # --- vLLM server ---
        - name: vllm
          image: ghcr.io/inference-sim/residency-vllm:0.23.1-residency
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              nvidia.com/gpu: 1
          command: ["/bin/sh", "-c"]
          args:
            - |
              vllm serve --model Qwen/Qwen3-14B --port 8000 &
              VLLM_PID=$!
              # Wait for driver to signal completion
              while [ ! -f /data/residency/.done ]; do
                sleep 5
              done
              echo "Driver finished. Shutting down vLLM server."
              kill $VLLM_PID
              wait $VLLM_PID 2>/dev/null
              rm -f /data/residency/.done
              exit 0
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
            - name: HOME
              value: "/cache"
            - name: HF_HOME
              value: "/cache/huggingface"
            - name: PROMETHEUS_MULTIPROC_DIR
              value: "/tmp/prometheus_multiproc"
          volumeMounts:
            - name: cache
              mountPath: /cache
            - name: prom-dir
              mountPath: /tmp/prometheus_multiproc
            - name: data
              mountPath: /data

        # --- Workload driver (waits for server, runs experiment, signals done) ---
        - name: driver
          image: ghcr.io/inference-sim/residency-vllm-client:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for vLLM server to be ready..."
              python3 -c "
              import urllib.request, time
              while True:
                  try:
                      urllib.request.urlopen('http://localhost:8000/v1/models')
                      break
                  except Exception:
                      time.sleep(5)
              "
              echo "Server ready. Starting experiment."
              python3 workload_driver.py \
                --base-url http://localhost:8000 \
                --model "Qwen/Qwen3-14B" \
                --tenants "tenant_A,tenant_B,tenant_C" \
                --rate 2.0 \
                --duration 300 \
                --prompt-tokens 1024 \
                --max-tokens 128 \
                --output-dir /data/residency
              echo "Experiment complete. Results written to /data/residency/"
              # Signal server to shut down
              touch /data/residency/.done
          volumeMounts:
            - name: data
              mountPath: /data

      volumes:
        - name: cache
          persistentVolumeClaim:
            claimName: vllm-cache-pvc
        - name: prom-dir
          emptyDir: {}
        - name: data
          persistentVolumeClaim:
            claimName: data-pvc
